services:

  ollama:
    image: ollama/ollama
    container_name: nyay-vani-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  backend:
      build:
        context: ./backend
        dockerfile: Dockerfile
      container_name: nyay-vani-backend
      ports:
        - "8000:8000"
      volumes:
        - ./backend:/app
        - chroma_data:/app/chroma_db
        - /Users/bhawna/strisakhi-models:/app/strisakhi-models
      env_file:
        - ./backend/.env
      environment:
        - OLLAMA_BASE_URL=http://host.docker.internal:8080
      extra_hosts:
        - "host.docker.internal:host-gateway"   # ← ADD THIS LINE
      depends_on:
        - ollama
      restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nyay-vani-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data: